<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer Pockets 聖地巡礼マップ</title>
  <meta name="description" content="Summer Pockets（サマポケ）聖地巡礼の地図・スポット一覧ビューア。男木島・女木島・直島ほかの聖地を地図とフィルタで探せます。" />
  <!-- 同梱した Leaflet / MapLibre GL（JSは実行時CDN不使用。ベクトルタイルのみ外部） -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__main">
      <h1 class="app-title">🌊 Summer Pockets 聖地巡礼マップ</h1>
      <p class="app-subtitle" id="subtitle"></p>
    </div>
    <div class="app-header__meta">
      <span class="badge badge--count" id="visible-count"></span>
      <!-- 公開時に自分のリポジトリURLへ差し替えてください -->
      <a class="header-link" id="repo-link" href="#" hidden rel="noopener noreferrer" target="_blank">GitHub</a>
    </div>
  </header>

  <!-- モバイル用 地図/一覧 切替タブ -->
  <nav class="mobile-tabs" aria-label="表示切替">
    <button type="button" class="mobile-tabs__btn is-active" data-view="list">📋 一覧</button>
    <button type="button" class="mobile-tabs__btn" data-view="map">🗺️ 地図</button>
  </nav>

  <main class="layout">
    <!-- 左: フィルタ + 一覧 -->
    <section class="panel" id="panel" aria-label="スポット一覧とフィルタ">
      <div class="filters">
        <input type="search" id="search" class="filters__search" placeholder="🔍 名前・ゲーム内呼称・住所で検索" autocomplete="off" />

        <div class="filter-group" id="area-filters" aria-label="エリアで絞り込み"></div>

        <details class="filter-more">
          <summary>カテゴリ・条件で絞り込み</summary>
          <div class="filter-group" id="category-filters" aria-label="カテゴリで絞り込み"></div>
          <div class="filter-group" id="toggle-filters" aria-label="条件で絞り込み"></div>
        </details>

        <div class="filters__actions">
          <button type="button" id="reset-filters" class="btn btn--ghost">フィルタをリセット</button>
          <button type="button" id="show-routes" class="btn btn--ghost">🚶 巡礼ルート</button>
          <button type="button" id="locate-me" class="btn btn--ghost">🧭 現在地</button>
        </div>
      </div>

      <ul class="spot-list" id="spot-list" aria-label="スポット一覧"></ul>
    </section>

    <!-- 右: 地図 -->
    <section class="map-wrap" id="map-wrap" aria-label="地図">
      <div id="map"></div>
    </section>
  </main>

  <!-- 詳細スライドパネル -->
  <aside class="detail" id="detail" aria-hidden="true" aria-label="スポット詳細">
    <button type="button" class="detail__close" id="detail-close" aria-label="閉じる">×</button>
    <div class="detail__body" id="detail-body"></div>
  </aside>

  <!-- ルート モーダル -->
  <div class="modal" id="routes-modal" aria-hidden="true" role="dialog" aria-label="推奨巡礼ルート">
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__content">
      <button type="button" class="modal__close" data-close-modal aria-label="閉じる">×</button>
      <div id="routes-body"></div>
    </div>
  </div>

  <div class="overlay" id="overlay" hidden></div>

  <footer class="app-footer">
    <p>聖地巡礼はマナーを守って。私有地に入らない・夜間は静かに・ゴミは持ち帰る・地元の方への敬意を最優先に。閉店施設は外観のみ、立入禁止・干潮条件のスポットは事前確認を。</p>
    <p class="app-footer__src">データ出典: 本リポジトリ内のリサーチ資料（CSV / Markdown）。地図: © OpenFreeMap © OpenMapTiles, Data from © OpenStreetMap contributors。座標精度はスポットごとのバッジを参照。</p>
  </footer>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="vendor/maplibre/maplibre-gl.js"></script>
  <script src="vendor/maplibre/maplibre-gl-leaflet.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
